<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Landing Page Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="#">MyBrand</a>
      </div>
    </nav>

    <section class="hero text-center d-flex align-items-center">
      <div class="container">
        <h1 class="fade-in">Welcome to My Landing Page</h1>
        <p class="slide-up">Learn CSS Animation & Bootstrap</p>
        <a href="#" class="btn btn-primary mt-3 pulse">Get Started</a>
      </div>
    </section>

    <section class="py-5">
      <div class="container">
        <div class="row text-center">
          <div class="col-md-4 mb-4">
            <div class="card p-3 hover-card">
              <h5>Fast</h5>
              <p>Build UI nhanh với Bootstrap</p>
            </div>
          </div>

          <div class="col-md-4 mb-4">
            <div class="card p-3 hover-card">
              <h5>Responsive</h5>
              <p>Hiển thị tốt trên mọi thiết bị</p>
            </div>
          </div>

          <div class="col-md-4 mb-4">
            <div class="card p-3 hover-card">
              <h5>Animation</h5>
              <p>Hiệu ứng mượt mà</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="cta text-center text-white d-flex align-items-center">
      <div class="container">
        <h2 class="fade-in">Ready to start?</h2>
        <button class="btn btn-light spin mt-3">Join Now</button>
      </div>
    </section>

    <footer class="text-center py-3 bg-dark text-white">
      <p>© 2026 My Landing Page</p>
    </footer>
  </body>
</html>
