<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Thực hành 2 – JS Shop | Fake Store API</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: Arial, sans-serif;
        background: #f5f7fa;
        min-height: 100vh;
      }

      header {
        background: #1f4e79;
        color: white;
        padding: 14px 28px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 50;
      }
      header h1 {
        font-size: 20px;
      }
      #cart-btn {
        background: #27ae60;
        border: none;
        color: white;
        padding: 8px 18px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 14px;
        font-weight: bold;
      }
      #cart-btn:hover {
        background: #219a52;
      }

      .controls {
        padding: 18px 28px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
        background: white;
        border-bottom: 1px solid #e0e0e0;
      }
      .controls label {
        font-size: 14px;
        color: #555;
      }
      select,
      input[type="text"] {
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
      }
      input[type="text"] {
        width: 220px;
      }
      button {
        padding: 8px 18px;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        background: #1f4e79;
        color: white;
        font-size: 14px;
      }
      button:hover {
        background: #2e75b6;
      }
      #sort {
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
      }

      #loading {
        text-align: center;
        padding: 60px;
        color: #888;
        font-size: 18px;
      }
      #error-msg {
        background: #fdecea;
        color: #c0392b;
        padding: 16px;
        margin: 16px 28px;
        border-radius: 8px;
        display: none;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
        gap: 18px;
        padding: 20px 28px;
      }
      .card {
        background: white;
        border-radius: 10px;
        padding: 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.09);
        display: flex;
        flex-direction: column;
        transition: box-shadow 0.2s;
      }
      .card:hover {
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
      }
      .card img {
        width: 100%;
        height: 170px;
        object-fit: contain;
        margin-bottom: 12px;
      }
      .card-category {
        font-size: 10px;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }
      .card-title {
        font-size: 13px;
        font-weight: bold;
        color: #1f4e79;
        flex: 1;
        margin-bottom: 8px;
        line-height: 1.4;
      }
      .card-rating {
        font-size: 12px;
        color: #f39c12;
        margin-bottom: 6px;
      }
      .card-price {
        font-size: 20px;
        color: #e74c3c;
        font-weight: bold;
        margin-bottom: 12px;
      }
      .btn-add {
        width: 100%;
        padding: 9px;
        background: #27ae60;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        font-weight: bold;
      }
      .btn-add:hover {
        background: #219a52;
      }
      .btn-add.added {
        background: #2e75b6;
      }

      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: #27ae60;
        color: white;
        padding: 12px 22px;
        border-radius: 8px;
        font-size: 14px;
        max-width: 300px;
        transform: translateY(80px);
        opacity: 0;
        transition: all 0.3s;
        pointer-events: none;
        z-index: 200;
      }
      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }

      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 100;
        justify-content: center;
        align-items: center;
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal-box {
        background: white;
        border-radius: 12px;
        padding: 24px;
        width: 500px;
        max-width: 95vw;
        max-height: 85vh;
        overflow-y: auto;
      }
      .modal-box h2 {
        color: #1f4e79;
        margin-bottom: 16px;
        border-bottom: 2px solid #e0e0e0;
        padding-bottom: 8px;
      }
      .cart-empty {
        text-align: center;
        color: #888;
        padding: 32px 0;
        font-size: 16px;
      }
      .cart-item {
        display: flex;
        gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid #f0f0f0;
        align-items: center;
      }
      .cart-item img {
        width: 50px;
        height: 50px;
        object-fit: contain;
      }
      .cart-item-info {
        flex: 1;
      }
      .cart-item-name {
        font-size: 13px;
        font-weight: bold;
        color: #333;
        line-height: 1.3;
      }
      .cart-item-price {
        font-size: 12px;
        color: #888;
        margin-top: 2px;
      }
      .cart-item-qty {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .qty-btn {
        width: 26px;
        height: 26px;
        border: 1px solid #ccc;
        background: #f5f5f5;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }
      .qty-btn:hover {
        background: #e0e0e0;
      }
      .cart-item-total {
        font-weight: bold;
        color: #e74c3c;
        font-size: 14px;
        min-width: 60px;
        text-align: right;
      }
      .cart-summary {
        margin-top: 16px;
        padding-top: 12px;
        border-top: 2px solid #1f4e79;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .cart-total-label {
        font-size: 16px;
        font-weight: bold;
        color: #333;
      }
      .cart-total-price {
        font-size: 22px;
        font-weight: bold;
        color: #e74c3c;
      }
      .modal-actions {
        display: flex;
        gap: 10px;
        margin-top: 16px;
      }
      .btn-checkout {
        flex: 1;
        padding: 12px;
        background: #27ae60;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 15px;
        font-weight: bold;
      }
      .btn-checkout:hover {
        background: #219a52;
      }
      .btn-modal-close {
        padding: 12px 20px;
        background: #888;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
      }
      .btn-clear-cart {
        padding: 12px 20px;
        background: #e74c3c;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
      }
      .btn-clear-cart:hover {
        background: #c0392b;
      }

      .storage-info {
        background: #f0f8ff;
        border: 1px solid #bee3f8;
        border-radius: 8px;
        padding: 12px 18px;
        margin: 0 28px 20px;
        font-size: 13px;
        color: #2c5282;
      }
      .storage-info strong {
        color: #1f4e79;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>🛒 JS Shop – Fake Store API</h1>
      <button id="cart-btn" onclick="openCart()">
        🛒 Giỏ hàng: 0 sp | $0.00
      </button>
    </header>

    <div class="controls">
      <label>Danh mục:</label>
      <select id="cat-filter" onchange="applyFilters()">
        <option value="all">Tất cả</option>
      </select>
      <label>Sắp xếp:</label>
      <select id="sort" onchange="applyFilters()">
        <option value="default">Mặc định</option>
        <option value="price-asc">Giá tăng dần</option>
        <option value="price-desc">Giá giảm dần</option>
        <option value="rating">Đánh giá cao nhất</option>
      </select>
      <input
        type="text"
        id="search"
        placeholder="🔍 Tìm sản phẩm..."
        oninput="applyFilters()"
      />
      <button onclick="clearCart()" style="background: #e74c3c">
        🗑 Xóa giỏ
      </button>
    </div>

    <div class="storage-info" id="storage-info">
      📦 <strong>Local Storage:</strong> Giỏ hàng được lưu vào trình duyệt — dữ
      liệu không mất khi tải lại trang. | <strong>Session Storage:</strong> Lịch
      sử tìm kiếm chỉ tồn tại trong phiên hiện tại.
    </div>

    <div id="loading">⏳ Đang tải sản phẩm từ API...</div>
    <div id="error-msg"></div>
    <div class="grid" id="grid"></div>

    <div class="toast" id="toast"></div>

    <div class="modal-overlay" id="cart-modal">
      <div class="modal-box">
        <h2>🛒 Giỏ hàng của bạn</h2>
        <div id="cart-content"></div>
        <div class="modal-actions">
          <button
            class="btn-clear-cart"
            onclick="
              clearCart();
              closeCart();
            "
          >
            Xóa giỏ
          </button>
          <button class="btn-modal-close" onclick="closeCart()">Đóng</button>
          <button class="btn-checkout" onclick="checkout()">
            Thanh toán ✓
          </button>
        </div>
      </div>
    </div>

    <script>
      let allProducts = [];
      let cart = JSON.parse(localStorage.getItem("jsshop_v2_cart") || "[]");
      let searchHistory = JSON.parse(
        sessionStorage.getItem("jsshop_search_history") || "[]",
      );

      async function loadProducts() {
        try {
          const res = await fetch("https://fakestoreapi.com/products");
          if (!res.ok) throw new Error("HTTP " + res.status);
          allProducts = await res.json();
          setupFilters();
          renderProducts(allProducts);
        } catch (err) {
          document.getElementById("loading").style.display = "none";
          const errEl = document.getElementById("error-msg");
          errEl.textContent = "❌ Không thể tải sản phẩm: " + err.message;
          errEl.style.display = "block";
          console.error("[fetchProducts] Lỗi:", err);
        }
      }

      async function addProductAPI(product) {
        try {
          const res = await fetch("https://fakestoreapi.com/products", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(product),
          });
          const data = await res.json();
          console.log("[POST] Sản phẩm mới được tạo (giả lập):", data);
        } catch (err) {
          console.error("[POST] Lỗi:", err);
        }
      }

      function setupFilters() {
        const cats = [...new Set(allProducts.map((p) => p.category))];
        const sel = document.getElementById("cat-filter");
        cats.forEach((c) => {
          const opt = document.createElement("option");
          opt.value = c;
          opt.textContent = c.charAt(0).toUpperCase() + c.slice(1);
          sel.appendChild(opt);
        });
      }

      function applyFilters() {
        let products = [...allProducts];
        const cat = document.getElementById("cat-filter").value;
        const sort = document.getElementById("sort").value;
        const search = document
          .getElementById("search")
          .value.toLowerCase()
          .trim();

        if (cat !== "all")
          products = products.filter((p) => p.category === cat);
        if (search) {
          products = products.filter((p) =>
            p.title.toLowerCase().includes(search),
          );
          if (search.length > 2 && !searchHistory.includes(search)) {
            searchHistory.unshift(search);
            if (searchHistory.length > 10) searchHistory.pop();
            sessionStorage.setItem(
              "jsshop_search_history",
              JSON.stringify(searchHistory),
            );
          }
        }
        if (sort === "price-asc") products.sort((a, b) => a.price - b.price);
        if (sort === "price-desc") products.sort((a, b) => b.price - a.price);
        if (sort === "rating")
          products.sort((a, b) => b.rating.rate - a.rating.rate);

        renderProducts(products);
      }

      function renderProducts(products) {
        document.getElementById("loading").style.display = "none";
        const grid = document.getElementById("grid");
        if (!products.length) {
          grid.innerHTML =
            '<p style="padding:40px;color:#888;grid-column:1/-1">Không tìm thấy sản phẩm phù hợp.</p>';
          return;
        }
        grid.innerHTML = products
          .map((p) => {
            const inCart = cart.some((i) => i.id === p.id);
            const stars =
              "★".repeat(Math.round(p.rating.rate)) +
              "☆".repeat(5 - Math.round(p.rating.rate));
            return `
        <div class="card">
          <img src="${p.image}" alt="${p.title}" loading="lazy">
          <div class="card-category">${p.category}</div>
          <div class="card-title">${p.title}</div>
          <div class="card-rating">${stars} ${p.rating.rate} (${p.rating.count})</div>
          <div class="card-price">$${p.price.toFixed(2)}</div>
          <button class="btn-add ${inCart ? "added" : ""}" onclick="addToCart(${p.id})">
            ${inCart ? "✓ Đã thêm" : "+ Thêm vào giỏ"}
          </button>
        </div>
      `;
          })
          .join("");
      }

      function addToCart(id) {
        const product = allProducts.find((p) => p.id === id);
        if (!product) return;
        const existing = cart.find((i) => i.id === id);
        if (existing) {
          existing.qty++;
        } else {
          cart.push({
            id: product.id,
            title: product.title,
            price: product.price,
            image: product.image,
            qty: 1,
          });
        }
        saveCart();
        updateCartBtn();
        applyFilters();
        showToast(`✅ Đã thêm: ${product.title.slice(0, 35)}...`);

        addProductAPI({
          title: product.title,
          price: product.price,
          category: product.category,
        });
      }

      function changeQty(id, delta) {
        const item = cart.find((i) => i.id === id);
        if (!item) return;
        item.qty += delta;
        if (item.qty <= 0) cart = cart.filter((i) => i.id !== id);
        saveCart();
        updateCartBtn();
        renderCartContent();
        applyFilters();
      }

      function saveCart() {
        localStorage.setItem("jsshop_v2_cart", JSON.stringify(cart));
      }

      function clearCart() {
        cart = [];
        saveCart();
        updateCartBtn();
        applyFilters();
        showToast("🗑 Đã xóa giỏ hàng");
      }

      function updateCartBtn() {
        const count = cart.reduce((s, i) => s + i.qty, 0);
        const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
        document.getElementById("cart-btn").textContent =
          `🛒 Giỏ hàng: ${count} sp | $${total.toFixed(2)}`;
      }

      function renderCartContent() {
        const el = document.getElementById("cart-content");
        if (!cart.length) {
          el.innerHTML = '<div class="cart-empty">🛒 Giỏ hàng trống</div>';
          return;
        }
        const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
        el.innerHTML = `
      ${cart
        .map(
          (i) => `
        <div class="cart-item">
          <img src="${i.image}" alt="${i.title}">
          <div class="cart-item-info">
            <div class="cart-item-name">${i.title.slice(0, 45)}...</div>
            <div class="cart-item-price">$${i.price.toFixed(2)} / sp</div>
          </div>
          <div class="cart-item-qty">
            <button class="qty-btn" onclick="changeQty(${i.id}, -1)">−</button>
            <span>${i.qty}</span>
            <button class="qty-btn" onclick="changeQty(${i.id}, +1)">+</button>
          </div>
          <div class="cart-item-total">$${(i.price * i.qty).toFixed(2)}</div>
        </div>
      `,
        )
        .join("")}
      <div class="cart-summary">
        <span class="cart-total-label">Tổng cộng:</span>
        <span class="cart-total-price">$${total.toFixed(2)}</span>
      </div>
    `;
      }

      function openCart() {
        renderCartContent();
        document.getElementById("cart-modal").classList.add("open");
      }
      function closeCart() {
        document.getElementById("cart-modal").classList.remove("open");
      }

      function checkout() {
        if (!cart.length) {
          showToast("⚠️ Giỏ hàng trống!");
          return;
        }
        clearCart();
        closeCart();
        showToast("🎉 Đặt hàng thành công! Cảm ơn bạn.");
      }

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 2800);
      }

      loadProducts();
      updateCartBtn();
    </script>
  </body>
</html>
