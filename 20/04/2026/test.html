<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Thực hành 1 – JSONPlaceholder Posts</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 860px;
        margin: 40px auto;
        padding: 0 20px;
        background: #f5f7fa;
      }
      h1 {
        color: #1f4e79;
        border-bottom: 3px solid #2e75b6;
        padding-bottom: 10px;
      }
      .controls {
        display: flex;
        gap: 12px;
        margin: 20px 0;
        flex-wrap: wrap;
      }
      button {
        background: #1f4e79;
        color: white;
        border: none;
        padding: 10px 22px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 15px;
      }
      button:hover {
        background: #2e75b6;
      }
      select {
        padding: 10px 14px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 15px;
      }
      #loading {
        color: #888;
        font-style: italic;
        display: none;
      }
      #error {
        color: #c0392b;
        background: #fdecea;
        padding: 12px;
        border-radius: 6px;
        display: none;
        margin: 10px 0;
      }
      #stats {
        background: #e8f4fd;
        border-radius: 6px;
        padding: 10px 16px;
        margin: 10px 0;
        font-size: 14px;
        color: #1f4e79;
        display: none;
      }
      .post-card {
        background: white;
        border-radius: 8px;
        padding: 16px 20px;
        margin: 12px 0;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        border-left: 4px solid #2e75b6;
        transition: transform 0.15s;
      }
      .post-card:hover {
        transform: translateX(4px);
      }
      .post-id {
        font-size: 11px;
        color: #aaa;
        margin-bottom: 4px;
      }
      .post-title {
        font-weight: bold;
        color: #1f4e79;
        margin-bottom: 6px;
        font-size: 15px;
      }
      .post-body {
        color: #555;
        font-size: 14px;
        line-height: 1.5;
      }
      .badge {
        display: inline-block;
        background: #e3f0ff;
        color: #1f4e79;
        border-radius: 12px;
        padding: 2px 10px;
        font-size: 11px;
        margin-bottom: 6px;
      }
    </style>
  </head>
  <body>
    <h1>📡 Thực hành 1 – Fetch API với JSONPlaceholder</h1>
    <p style="color: #555; font-size: 14px">
      Gọi API public, xử lý async/await, hiển thị dữ liệu lên DOM, có xử lý lỗi.
    </p>

    <div class="controls">
      <select id="limit">
        <option value="5">5 posts</option>
        <option value="10" selected>10 posts</option>
        <option value="20">20 posts</option>
      </select>
      <select id="userId">
        <option value="">Tất cả users</option>
        <option value="1">User 1</option>
        <option value="2">User 2</option>
        <option value="3">User 3</option>
      </select>
      <button onclick="fetchPosts()">🔄 Tải dữ liệu</button>
      <button onclick="clearList()" style="background: #888">🗑 Xóa</button>
    </div>

    <p id="loading">⏳ Đang tải dữ liệu...</p>
    <p id="error"></p>
    <div id="stats"></div>
    <div id="post-list"></div>

    <script>
      function doSomethingWithData(data, callback) {
        const processed = data.map((p) => ({
          ...p,
          titleUpper: p.title.toUpperCase(),
        }));
        callback(processed);
      }

      function fetchWithPromise(url) {
        return fetch(url)
          .then((res) => {
            if (!res.ok) throw new Error("HTTP Error: " + res.status);
            return res.json();
          })
          .then((data) => {
            console.log("[Promise] Nhận được", data.length, "posts");
            return data;
          })
          .catch((err) => {
            console.error("[Promise] Lỗi:", err.message);
            throw err;
          });
      }

      async function fetchPosts() {
        const loading = document.getElementById("loading");
        const errorEl = document.getElementById("error");
        const stats = document.getElementById("stats");
        const list = document.getElementById("post-list");

        loading.style.display = "block";
        errorEl.style.display = "none";
        stats.style.display = "none";
        list.innerHTML = "";

        const limit = document.getElementById("limit").value;
        const userId = document.getElementById("userId").value;
        let url = `https://jsonplaceholder.typicode.com/posts?_limit=${limit}`;
        if (userId) url += `&userId=${userId}`;

        try {
          const startTime = Date.now();
          const response = await fetch(url);
          if (!response.ok)
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);

          const posts = await response.json();
          const elapsed = Date.now() - startTime;

          doSomethingWithData(posts, (processed) => {
            console.log("[Callback] Đã xử lý", processed.length, "posts");
          });

          renderPosts(posts);
          stats.style.display = "block";
          stats.innerHTML = `✅ Tải thành công <strong>${posts.length} posts</strong> trong <strong>${elapsed}ms</strong> | URL: <code>${url}</code>`;
        } catch (err) {
          errorEl.textContent = "❌ Lỗi: " + err.message;
          errorEl.style.display = "block";
          console.error("[Async/Await] Lỗi catch:", err);
        } finally {
          loading.style.display = "none";
        }
      }

      function renderPosts(posts) {
        const list = document.getElementById("post-list");
        list.innerHTML = posts
          .map(
            (p) => `
        <div class="post-card">
          <div class="post-id">Post #${p.id}</div>
          <span class="badge">User ${p.userId}</span>
          <div class="post-title">${p.title}</div>
          <div class="post-body">${p.body}</div>
        </div>
      `,
          )
          .join("");
      }

      function clearList() {
        document.getElementById("post-list").innerHTML = "";
        document.getElementById("stats").style.display = "none";
        document.getElementById("error").style.display = "none";
      }

      fetchPosts();
    </script>
  </body>
</html>
